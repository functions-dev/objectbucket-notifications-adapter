# This rule is not used by the project objectbucket-notifications-adapter itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to sources.functions.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: objectbucket-notifications-adapter
    app.kubernetes.io/managed-by: kustomize
  name: objectbucketsource-viewer-role
rules:
- apiGroups:
  - sources.functions.dev
  resources:
  - objectbucketsources
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sources.functions.dev
  resources:
  - objectbucketsources/status
  verbs:
  - get
